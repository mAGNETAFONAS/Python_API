<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Path Mapper</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 100px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
        }
        .status {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        /* The Small Box (Input) */
        .small-box {
            padding: 15px;
            width: 300px;
            border: 2px solid #333;
            border-radius: 5px;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 30px;
        }
        /* The Big Box (Result) */
        .big-box {
            width: 80%;
            max-width: 600px;
            min-height: 150px;
            padding: 30px;
            background-color: #ffffff;
            border: 4px solid #333;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-wrap: break-word;
        }

    </style>
</head>
<body>

    <div class="status">Server is running</div>

    <form id="urlForm">
        <input type="text"
               class="small-box"
               id="userInput"
               placeholder="Type path here..."
               value="{{ part1 }}">
    </form>

    <div class="big-box">
            <strong>{{ dir_list }}</strong>
    </div>

    <script>
        // When you hit Enter in the small box, it changes the URL
        document.getElementById('urlForm').onsubmit = function(e) {
            e.preventDefault();
            const val = document.getElementById('userInput').value;
            if(val) {
                // If you have "part2" currently, we preserve it
                // and just change the first part of the path
                const currentPart2 = "{{ part2 }}";
                if (currentPart2) {
                    window.location.href = "/" + val + "/" + currentPart2;
                } else {
                    window.location.href = "/" + val;
                }
            } else {
                window.location.href = "/";
            }
        };
    </script>

</body>
</html>
